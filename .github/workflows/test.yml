name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.3.1

      - name: Set up JDK 21
        uses: actions/setup-java@v4.8.0
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.4.4

      - name: Run unit tests
        run: ./gradlew test -x :integration-tests:test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: test-report
          path: "**/build/reports/tests/test/"

  integration-test:
    runs-on: ubuntu-latest
    env:
      OLLAMA_DATA_DIR: ${{ github.workspace }}/.ci/ollama

    steps:
      - uses: actions/checkout@v4.3.1

      - name: Set up JDK 21
        uses: actions/setup-java@v4.8.0
        with:
          java-version: "21"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4.4.4

      - name: Restore Ollama model cache
        uses: actions/cache@v4
        with:
          path: ${{ env.OLLAMA_DATA_DIR }}
          key: ollama-models-${{ runner.os }}-0.18.3-llama3-nomic-embed-text-v1

      - name: Run integration tests
        run: |
          bash integration-tests/scripts/start-stack.sh
          ./gradlew :integration-tests:test
        env:
          GRADLE_USER_HOME: ${{ runner.temp }}/gradle-integration-home

      - name: Upload integration test report
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: integration-test-report
          path: "**/build/reports/tests/test/"

      - name: Collect docker logs
        if: failure()
        run: |
          mkdir -p /tmp/mesoql-docker-logs
          docker compose logs --no-color > /tmp/mesoql-docker-logs/compose.log 2>&1 || true

      - name: Upload docker logs
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: docker-logs
          path: /tmp/mesoql-docker-logs/
