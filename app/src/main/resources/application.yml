spring:
  graphql:
    graphiql:
      enabled: true
      path: /graphiql
  main:
    banner-mode: off
    log-startup-info: false

logging:
  level:
    root: WARN
    com.mesoql: INFO

mesoql:
  opensearch-url: http://localhost:9200
  ollama-base-url: http://localhost:11434
  embed-model: nomic-embed-text
  generate-model: llama3
  nws-api-url: https://api.weather.gov
