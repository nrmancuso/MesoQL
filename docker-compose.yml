services:
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: mesoql-opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  ollama:
    image: ollama/ollama:0.18.3
    container_name: mesoql-ollama
    ports:
      - "11434:11434"
    volumes:
      - ${OLLAMA_DATA_DIR:-ollama-data}:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  forecast-discussion-fixtures:
    profiles: ["integration"]
    image: python:3.12-alpine
    volumes:
      - ./integration-tests/scripts/serve-forecast-discussion-fixtures.py:/srv/serve.py:ro
      - ./integration-tests/fixtures/forecast-discussion-products.json:/fixtures/forecast-discussion-products.json:ro
    ports:
      - "${FORECAST_DISCUSSION_FIXTURE_PORT:-18080}:18080"
    command: ["python", "/srv/serve.py", "18080", "/fixtures/forecast-discussion-products.json"]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:18080/products')"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 5s

volumes:
  opensearch-data:
  ollama-data:
